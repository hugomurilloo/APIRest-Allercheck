spring.application.name=projecte1
server.port=8081

# Configuración de la base de dades MySQL
spring.datasource.url=jdbc:mysql://localhost:3309/mydatabase
spring.datasource.username=myuser
spring.datasource.password=secret
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Inicialitzar la base de dades automàticament
spring.sql.init.mode=always
spring.sql.init.schema-mode=always
